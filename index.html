<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BetEdge — AI Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0d12; --card:#111720; --card2:#161e28;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --green:#00d68f; --green-dim:rgba(0,214,143,0.12); --green-border:rgba(0,214,143,0.25);
  --blue:#3b82f6; --red:#f43f5e; --orange:#f97316;
  --text:#f0f4f8; --text2:#8899aa; --text3:#4a5568;
  --r:14px; --rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,13,18,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.15rem;font-weight:800;letter-spacing:-0.03em;display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.logo span{color:var(--green)}
.vtag{font-family:'JetBrains Mono',monospace;font-size:0.6rem;background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);padding:3px 7px;border-radius:4px}
main{padding:14px 14px 80px;min-height:calc(100vh - 52px)}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ptitle{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text2)}
.ldot{display:flex;align-items:center;gap:4px;font-size:0.6rem;color:var(--green);font-family:'JetBrains Mono',monospace;margin-left:auto}
.ldot::before{content:'';width:5px;height:5px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite}
.sr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sb{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center}
.sv{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:600;color:var(--green);display:block;line-height:1}
.sl{font-size:0.55rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-top:4px;display:block}
.pc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.plbl{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);margin-bottom:10px}
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pi{text-align:center}
.pv{font-family:'JetBrains Mono',monospace;font-size:0.95rem;font-weight:600;color:var(--green)}
.pl{font-size:0.52rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-top:2px}
.filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px}
.filters::-webkit-scrollbar{display:none}
.fb{background:var(--card);border:1px solid var(--border);color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.68rem;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.fb.active{background:var(--green-dim);border-color:var(--green-border);color:var(--green)}
.gc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color 0.2s;animation:su 0.4s ease both}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.gc:hover{border-color:var(--border2)}
.gc.expanded{border-color:var(--green-border)}
.ch{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 0}
.cl{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
.ct{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--text2)}
.mu{display:grid;grid-template-columns:1fr 36px 1fr;align-items:center;gap:8px;padding:10px 14px 12px}
.tb{display:flex;flex-direction:column}
.tb.r{align-items:flex-end}
.tc{font-size:1.5rem;font-weight:800;letter-spacing:-0.04em;line-height:1}
.tc.pk{color:var(--green)}
.tf{font-size:0.62rem;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.tr{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--text3);margin-top:2px}
.b2b{font-size:0.52rem;font-weight:700;background:rgba(249,115,22,0.15);color:var(--orange);border:1px solid rgba(249,115,22,0.25);padding:1px 5px;border-radius:3px;margin-top:3px;display:inline-block}
.vc{text-align:center;font-size:0.6rem;font-weight:700;color:var(--text3)}
.ps{padding:0 14px 10px}
.pbb{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin-bottom:5px}
.pbf{height:100%;background:linear-gradient(90deg,var(--green),#00b8ff);border-radius:3px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.pls{display:flex;justify-content:space-between;align-items:center}
.pn{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:600}
.pn.h{color:var(--green)}
.pn.a{color:var(--text2);opacity:0.6}
.ctag{font-family:'JetBrains Mono',monospace;font-size:0.58rem;background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);padding:2px 7px;border-radius:20px}
.evr{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 14px 10px}
.evb{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px}
.evl{font-size:0.55rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:3px}
.evn{font-family:'JetBrains Mono',monospace;font-size:0.88rem;font-weight:600}
.ep{color:var(--green)}
.en{color:var(--red)}
.vb{margin:0 14px 10px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:var(--rs);padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:0.7rem}
.vb strong{color:var(--green)}
.tn{margin:0 14px 10px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:var(--rs);padding:7px 12px;font-size:0.65rem;color:#93c5fd;display:flex;align-items:center;gap:6px}
.eb{width:100%;background:none;border:none;border-top:1px solid var(--border);color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;padding:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:color 0.15s}
.eb:hover{color:var(--green)}
.ei{transition:transform 0.25s;font-size:0.75rem}
.expanded .ei{transform:rotate(180deg)}
.det{display:none;padding:14px;border-top:1px solid var(--border);animation:su 0.2s ease}
.expanded .det{display:block}
.ds{margin-bottom:14px}
.ds:last-child{margin-bottom:0}
.dh{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text3);padding-bottom:7px;border-bottom:1px solid var(--border);margin-bottom:9px}
.ct2{width:100%;border-collapse:collapse}
.ct2 th{font-size:0.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:3px 0;text-align:right;font-weight:600}
.ct2 th:first-child{text-align:left}
.ct2 td{font-family:'JetBrains Mono',monospace;font-size:0.72rem;padding:5px 0;text-align:right;border-bottom:1px solid var(--border)}
.ct2 td:first-child{text-align:left;color:var(--text2);font-size:0.65rem;font-family:'Plus Jakarta Sans',sans-serif}
.hl{color:var(--green)}
.kb{background:var(--green-dim);border:1px solid var(--green-border);border-radius:var(--rs);padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ki .kl{font-size:0.55rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2)}
.ki .kv{font-family:'JetBrains Mono',monospace;font-size:0.88rem;color:var(--green);margin-top:2px}
.sc{display:grid;grid-template-columns:1fr auto 1fr;gap:3px 8px}
.scv{font-family:'JetBrains Mono',monospace;font-size:0.72rem;padding:4px 0}
.scv.l{text-align:left}
.scv.r{text-align:right}
.scv.bt{color:var(--green);font-weight:600}
.scl{text-align:center;font-size:0.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;align-self:center}
.rr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.rt{font-size:0.62rem;padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace}
.rg{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.rb{background:rgba(249,115,22,0.12);color:var(--orange);border:1px solid rgba(249,115,22,0.25)}
.rn{background:var(--card2);color:var(--text2);border:1px solid var(--border)}
.il{display:flex;flex-direction:column;gap:5px}
.ii{display:flex;align-items:center;gap:7px;font-size:0.68rem}
.ib{font-family:'JetBrains Mono',monospace;font-size:0.55rem;padding:2px 6px;border-radius:3px;white-space:nowrap}
.io{background:rgba(244,63,94,0.15);color:var(--red);border:1px solid rgba(244,63,94,0.25)}
.id{background:rgba(249,115,22,0.12);color:var(--orange);border:1px solid rgba(249,115,22,0.25)}
.fac{display:flex;flex-direction:column;gap:5px}
.fa{display:flex;align-items:flex-start;gap:7px;font-size:0.68rem;color:var(--text);opacity:0.8}
.fa::before{content:'→';color:var(--green);flex-shrink:0}
.bn{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;background:rgba(10,13,18,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 14px}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:0.35;transition:opacity 0.15s;padding:4px 20px;background:none;border:none}
.nb.active{opacity:1}
.nb.active .ni{color:var(--green)}
.ni{font-size:1.05rem}
.nl{font-size:0.52rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text2)}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.shead{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text2);margin-bottom:12px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mb{background:var(--card2);border-radius:var(--rs);padding:10px;text-align:center}
.mv{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:600;color:var(--green)}
.ml{font-size:0.55rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-top:3px}
.pr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.pr:last-child{border-bottom:none}
.pt{font-size:0.78rem;font-weight:600}
.ps2{font-size:0.6rem;color:var(--text2);margin-top:1px}
.pe{font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:600;text-align:right}
.pc2{font-size:0.6rem;color:var(--text2);margin-top:1px;text-align:right}
.vbc{background:var(--green-dim);border:1px solid var(--green-border);border-radius:var(--rs);padding:12px;margin-bottom:8px}
.vbt{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.vbp{font-weight:800;font-size:0.9rem;color:var(--green)}
.vbe{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--green)}
.vbm{font-size:0.63rem;color:var(--text2)}
.vbts{display:flex;gap:6px;margin-top:8px}
.vbtg{font-family:'JetBrains Mono',monospace;font-size:0.6rem;padding:3px 8px;border-radius:4px;background:rgba(0,214,143,0.1);color:var(--green);border:1px solid var(--green-border)}
.cdh{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text2);padding:12px 0 6px;display:flex;align-items:center;gap:8px}
.cdh::after{content:'';flex:1;height:1px;background:var(--border)}
.cg{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.cgt{font-size:0.82rem;font-weight:700}
.cgs{font-size:0.6rem;color:var(--text2);margin-top:2px}
.ctime{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--text2)}
.stip{background:var(--card2);border-radius:var(--rs);padding:11px;margin-bottom:8px}
.stitt{font-size:0.72rem;font-weight:700;color:var(--green);margin-bottom:4px}
.stitb{font-size:0.65rem;color:var(--text2);line-height:1.5}
.fbox{background:var(--green-dim);border:1px solid var(--green-border);border-radius:var(--rs);padding:12px;margin:10px 0}
.form{font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--green);margin-bottom:5px}
.fn{font-size:0.62rem;color:var(--text2);line-height:1.5}
.br{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.72rem}
.br:last-child{border-bottom:none}
.bm{font-family:'JetBrains Mono',monospace;font-size:0.72rem}
.lu{text-align:center;font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--text3);margin-bottom:12px}
.empty{text-align:center;padding:50px 20px;color:var(--text2);font-size:0.78rem;line-height:1.6}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>Bet<span>Edge</span></div>
  <div class="vtag">AI v4.0</div>
</div>
<main id="M"></main>
<nav class="bn">
  <button class="nb active" onclick="showPage('home')"><div class="ni">🏠</div><div class="nl">Home</div></button>
  <button class="nb" onclick="showPage('analyse')"><div class="ni">📊</div><div class="nl">Analyse</div></button>
  <button class="nb" onclick="showPage('kalender')"><div class="ni">📅</div><div class="nl">Kalender</div></button>
  <button class="nb" onclick="showPage('strategie')"><div class="ni">⚙️</div><div class="nl">Strategie</div></button>
</nav>
<script>
let D=null,CP='home',CF='all';
const fd=iso=>{if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})};
const ec=ev=>ev>0?'ep':'en';
const es=ev=>(ev>0?'+':'')+ev.toFixed(1)+'%';
const ib=s=>{const sl=s.toLowerCase();return sl.includes('out')?'<span class="ib io">Out</span>':'<span class="ib id">D-t-D</span>'};
const iname=s=>s.replace(' (Out)','').replace(' (Day-to-Day)','').replace(' (Questionable)','').replace(' (Doubtful)','');
const rtag=(d,b2b)=>{if(b2b)return'<span class="rt rb">B2B</span>';if(d>=3)return`<span class="rt rg">${d}d Ruhe</span>`;if(d===2)return'<span class="rt rn">2d Ruhe</span>';return'<span class="rt rb">1d Ruhe</span>'};

function rCard(g,i){
  const p=g.prediction,h=g.home,a=g.away;
  const hp=Math.round(p.home_win_prob*100),ap=Math.round(p.away_win_prob*100);
  const pk=abbr=>p.model_pick===abbr;
  const bd=((p.home_win_prob-p.book_home_prob)*100).toFixed(1);
  const ai=[...(h.injuries||[]).map(x=>({t:h.abbr,s:x})),...(a.injuries||[]).map(x=>({t:a.abbr,s:x}))];
  return`<div class="gc" id="gc${i}" style="animation-delay:${i*0.08}s" onclick="tc(${i})">
<div class="ch"><span class="cl">🏀 NBA</span><span class="ct">${g.time} Uhr</span></div>
<div class="mu">
  <div class="tb">
    <div class="tc ${pk(h.abbr)?'pk':''}">${h.abbr}</div>
    <div class="tf">${h.name}</div>
    <div class="tr">${h.record}</div>
    ${h.back_to_back?'<span class="b2b">B2B</span>':''}
  </div>
  <div class="vc">VS</div>
  <div class="tb r">
    <div class="tc ${pk(a.abbr)?'pk':''}">${a.abbr}</div>
    <div class="tf">${a.name}</div>
    <div class="tr">${a.record}</div>
    ${a.back_to_back?'<span class="b2b">B2B</span>':''}
  </div>
</div>
<div class="ps">
  <div class="pbb"><div class="pbf" style="width:${hp}%"></div></div>
  <div class="pls">
    <span class="pn h">${hp}% ${h.abbr}</span>
    <span class="ctag">${p.confidence}% Conf.</span>
    <span class="pn a">${ap}% ${a.abbr}</span>
  </div>
</div>
<div class="evr">
  <div class="evb"><div class="evl">${h.abbr} Expected Value</div><div class="evn ${ec(p.home_ev)}">${es(p.home_ev)}</div></div>
  <div class="evb"><div class="evl">${a.abbr} Expected Value</div><div class="evn ${ec(p.away_ev)}">${es(p.away_ev)}</div></div>
</div>
${p.value_bet?`<div class="vb"><span>↗</span><span>Value Bet: <strong>${p.value_bet}</strong> — ${Math.abs(parseFloat(bd)).toFixed(1)}% Edge vs. Buchmacher</span></div>`:''}
<div class="tn"><span>🎯</span><span>Tipico: ${h.abbr} ${p.home_odds} · ${a.abbr} ${p.away_odds}</span></div>
<button class="eb"><span>Vollständige Analyse</span><span class="ei">▾</span></button>
<div class="det">
  <div class="ds">
    <div class="dh">🤖 AI vs. Buchmacher</div>
    <table class="ct2"><thead><tr><th></th><th>${h.abbr}</th><th>${a.abbr}</th></tr></thead>
    <tbody>
      <tr><td>AI Prob</td><td class="hl">${hp}%</td><td>${ap}%</td></tr>
      <tr><td>Book Prob</td><td>${Math.round(p.book_home_prob*100)}%</td><td>${Math.round(p.book_away_prob*100)}%</td></tr>
      <tr><td>Tipico Odds</td><td>${p.home_odds}</td><td>${p.away_odds}</td></tr>
      <tr><td>EV</td><td class="${ec(p.home_ev)}">${es(p.home_ev)}</td><td class="${ec(p.away_ev)}">${es(p.away_ev)}</td></tr>
    </tbody></table>
  </div>
  <div class="ds">
    <div class="dh">📐 Kelly Kriterium</div>
    <div class="kb">
      <div class="ki"><div class="kl">Kelly Fraction</div><div class="kv">${(p.kelly_fraction*100).toFixed(1)}%</div></div>
      <div class="ki"><div class="kl">½ Kelly (empf.)</div><div class="kv">${(p.kelly_fraction*50).toFixed(1)}%</div></div>
      <div class="ki"><div class="kl">Pick</div><div class="kv">${p.model_pick}</div></div>
      <div class="ki"><div class="kl">Confidence</div><div class="kv">${p.confidence}%</div></div>
    </div>
  </div>
  <div class="ds">
    <div class="dh">😴 Rest & Back-to-Back</div>
    <div class="rr">
      <span style="font-size:0.68rem;color:var(--text2)">${h.abbr}:</span>
      ${rtag(h.rest_days||2,h.back_to_back||false)}
      <span style="font-size:0.68rem;color:var(--text2);margin:0 4px">|</span>
      <span style="font-size:0.68rem;color:var(--text2)">${a.abbr}:</span>
      ${rtag(a.rest_days||2,a.back_to_back||false)}
    </div>
  </div>
  <div class="ds">
    <div class="dh">📊 Saisonstatistiken</div>
    <div class="sc">
      <div class="scv l ${h.offensive_rating>a.offensive_rating?'bt':''}">${h.offensive_rating}</div><div class="scl">Off Rtg</div><div class="scv r ${a.offensive_rating>h.offensive_rating?'bt':''}">${a.offensive_rating}</div>
      <div class="scv l ${h.defensive_rating<a.defensive_rating?'bt':''}">${h.defensive_rating}</div><div class="scl">Def Rtg</div><div class="scv r ${a.defensive_rating<h.defensive_rating?'bt':''}">${a.defensive_rating}</div>
      <div class="scv l ${h.net_rating>a.net_rating?'bt':''}">${h.net_rating>0?'+':''}${h.net_rating}</div><div class="scl">Net Rtg</div><div class="scv r ${a.net_rating>h.net_rating?'bt':''}">${a.net_rating>0?'+':''}${a.net_rating}</div>
      <div class="scv l">${h.last5}</div><div class="scl">Last 5</div><div class="scv r">${a.last5}</div>
      <div class="scv l">${(h.win_pct*100).toFixed(0)}%</div><div class="scl">Win%</div><div class="scv r">${(a.win_pct*100).toFixed(0)}%</div>
    </div>
  </div>
  ${ai.length>0?`<div class="ds"><div class="dh">⚠️ Injury Report</div><div class="il">${ai.map(x=>`<div class="ii">${ib(x.s)}<span>${x.t} — ${iname(x.s)}</span></div>`).join('')}</div></div>`:''}
  <div class="ds">
    <div class="dh">🔑 Key Factors</div>
    <div class="fac">${(p.key_factors||[]).map(f=>`<div class="fa">${f}</div>`).join('')}</div>
  </div>
</div>
</div>`;
}

function tc(i){document.getElementById('gc'+i).classList.toggle('expanded')}

function ab(){setTimeout(()=>{document.querySelectorAll('.pbf').forEach(b=>{const w=b.style.width;b.style.width='0%';setTimeout(()=>{b.style.width=w},60)})},100)}

function rHome(){
  if(!D)return'<div class="empty">Lade Daten...</div>';
  const gs=D.games||[];
  const fl=CF==='value'?gs.filter(g=>g.prediction.value_bet):gs;
  const vb=gs.filter(g=>g.prediction.value_bet).length;
  const pe=gs.filter(g=>Math.max(g.prediction.home_ev,g.prediction.away_ev)>0);
  const avg=pe.length>0?'+'+( pe.reduce((s,g)=>s+Math.max(g.prediction.home_ev,g.prediction.away_ev),0)/pe.length).toFixed(1)+'%':'—';
  return`<div class="lu">Aktualisiert: ${fd(D.last_updated)}</div>
<div class="pc"><div class="plbl">🧠 Modell Performance — Saison 2025/26</div>
<div class="pg">
  <div class="pi"><div class="pv">${D.model_stats?.season_record||'—'}</div><div class="pl">Record</div></div>
  <div class="pi"><div class="pv">${D.model_stats?.accuracy||'—'}</div><div class="pl">Accuracy</div></div>
  <div class="pi"><div class="pv">${D.model_stats?.roi||'—'}</div><div class="pl">ROI</div></div>
  <div class="pi"><div class="pv">${D.model_stats?.avg_confidence||0}%</div><div class="pl">Ø Conf.</div></div>
</div></div>
<div class="sr">
  <div class="sb"><span class="sv">${gs.length}</span><span class="sl">Spiele</span></div>
  <div class="sb"><span class="sv">${vb}</span><span class="sl">Value Bets</span></div>
  <div class="sb"><span class="sv">${avg}</span><span class="sl">Ø +EV</span></div>
</div>
<div class="filters">
  <button class="fb ${CF==='all'?'active':''}" onclick="sf('all',this)">Alle</button>
  <button class="fb ${CF==='value'?'active':''}" onclick="sf('value',this)">⚡ Value Bets</button>
  <button class="fb">🏀 NBA</button>
  <button class="fb">⚽ Fußball</button>
  <button class="fb">🎾 Tennis</button>
</div>
<div class="ph"><span class="ptitle">Heutige Vorhersagen</span><span class="ldot">Live Model</span></div>
${fl.length===0?'<div class="empty">Keine Spiele gefunden</div>':fl.map((g,i)=>rCard(g,i)).join('')}`;
}

function sf(f,btn){CF=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(CP==='home'){document.getElementById('M').innerHTML=rHome();ab()}}

function rAnalyse(){
  if(!D||!D.games)return'<div class="empty">Keine Daten verfügbar</div>';
  const gs=D.games,vb=gs.filter(g=>g.prediction.value_bet);
  const ac=gs.length>0?Math.round(gs.reduce((s,g)=>s+g.prediction.confidence,0)/gs.length):0;
  let h=`<div class="ph"><span class="ptitle">Analyse — Heute</span></div>
<div class="scard"><div class="shead">Tagesübersicht</div><div class="mg">
  <div class="mb"><div class="mv">${gs.length}</div><div class="ml">Spiele</div></div>
  <div class="mb"><div class="mv">${vb.length}</div><div class="ml">Value Bets</div></div>
  <div class="mb"><div class="mv">${ac}%</div><div class="ml">Ø Confidence</div></div>
  <div class="mb"><div class="mv">${D.model_stats?.roi||'—'}</div><div class="ml">ROI Saison</div></div>
</div></div>`;
  if(vb.length>0){
    h+=`<div class="scard"><div class="shead">🔥 Value Bets heute</div>`;
    vb.forEach(g=>{const p=g.prediction,ih=p.value_bet===g.home.abbr,ev=ih?p.home_ev:p.away_ev,od=ih?p.home_odds:p.away_odds;
    h+=`<div class="vbc"><div class="vbt"><span class="vbp">${p.value_bet}</span><span class="vbe">+${ev.toFixed(1)}% EV</span></div>
    <div class="vbm">${g.home.abbr} vs ${g.away.abbr} · ${g.time} Uhr · Tipico: ${od}</div>
    <div class="vbts"><span class="vbtg">½ Kelly: ${(p.kelly_fraction*50).toFixed(1)}%</span><span class="vbtg">${p.confidence}% Conf.</span></div></div>`;});
    h+=`</div>`;
  }
  h+=`<div class="scard"><div class="shead">Alle Picks heute</div>`;
  gs.forEach(g=>{const p=g.prediction,be=Math.max(p.home_ev,p.away_ev);
  h+=`<div class="pr"><div><div class="pt">${g.home.abbr} vs ${g.away.abbr}</div><div class="ps2">${g.time} Uhr · Pick: <span style="color:var(--green)">${p.model_pick}</span></div></div>
  <div><div class="pe ${ec(be)}">${es(be)}</div><div class="pc2">${p.confidence}% Conf.</div></div></div>`;});
  h+=`</div>`;
  return h;
}

function rKalender(){
  const up=D?.upcoming||[];
  let h=`<div class="ph"><span class="ptitle">Spielplan — Nächste 10 Tage</span></div>`;
  if(up.length===0)return h+`<div class="empty">Kalender wird beim nächsten täglichen Update geladen.</div>`;
  let ld='';
  up.forEach(g=>{
    if(g.date!==ld){ld=g.date;h+=`<div class="cdh">${g.weekday?g.weekday+' · ':''}${g.date}</div>`}
    h+=`<div class="cg"><div><div class="cgt">${g.home_abbr} vs ${g.away_abbr}</div><div class="cgs">${g.home_name}</div></div><div class="ctime">${g.time}</div></div>`;
  });
  return h;
}

function rStrategie(){
  return`<div class="ph"><span class="ptitle">Strategie & Wettregeln</span></div>
<div class="scard"><div class="shead">📐 Kelly Kriterium</div>
<p style="font-size:0.72rem;color:var(--text2);line-height:1.6;margin-bottom:10px">Berechnet den optimalen Einsatz basierend auf Gewinnwahrscheinlichkeit und Quoten.</p>
<div class="fbox"><div class="form">f = (p × b − q) / b</div><div class="fn">f = Einsatz-Anteil · p = Gewinnwahrsch. · b = Quote−1 · q = 1−p</div></div></div>
<div class="scard"><div class="shead">💡 Empfehlungen</div>
<div class="stip"><div class="stitt">½ Kelly nutzen</div><div class="stitb">Halbiertes Kelly reduziert das Risiko bei ~75% des Ertrags. Empfohlen für Anfänger.</div></div>
<div class="stip"><div class="stitt">Nur +EV Bets</div><div class="stitb">Nur wetten wenn Expected Value positiv (grün) ist. Negative EV = langfristiger Verlust.</div></div>
<div class="stip"><div class="stitt">Max 3-5% pro Wette</div><div class="stitb">Nie mehr als 5% der Bankroll auf eine einzelne Wette setzen.</div></div>
<div class="stip"><div class="stitt">Confidence über 60%</div><div class="stitb">Unter 55% Confidence = zu unsicher zum Wetten.</div></div>
<div class="stip"><div class="stitt">Paper Trading zuerst</div><div class="stitb">4 Wochen Picks ohne echtes Geld tracken um die Genauigkeit zu verifizieren.</div></div></div>
<div class="scard"><div class="shead">🎯 Buchmacher Margin</div>
<div class="br"><span style="font-weight:700;color:var(--green)">Tipico</span><span class="bm" style="color:var(--red)">~6%</span></div>
<div class="br"><span>Bet365</span><span class="bm" style="color:var(--orange)">~5%</span></div>
<div class="br"><span>Bwin</span><span class="bm" style="color:var(--orange)">~5%</span></div>
<div class="br"><span>Betfair Exchange</span><span class="bm" style="color:var(--green)">~2-3%</span></div>
<div class="br"><span>Pinnacle</span><span class="bm" style="color:var(--green)">~2%</span></div>
<p style="font-size:0.62rem;color:var(--text3);margin-top:10px;line-height:1.5">Bei Tipico ist die Margin höher — du brauchst einen größeren Edge. Das Modell rechnet die Tipico-Margin bereits ein.</p></div>`;
}

function showPage(p){
  CP=p;
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('active',['home','analyse','kalender','strategie'][i]===p));
  const m=document.getElementById('M');
  if(p==='home'){m.innerHTML=rHome();ab()}
  else if(p==='analyse')m.innerHTML=rAnalyse();
  else if(p==='kalender')m.innerHTML=rKalender();
  else if(p==='strategie')m.innerHTML=rStrategie();
}

async function init(){
  try{const r=await fetch('data/predictions.json');D=await r.json()}catch(e){D=null}
  showPage('home');
}

init();
</script>
</body>
</html>
